apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-html-app
  labels:
    app: simple-html-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-html-app
  template:
    metadata:
      labels:
        app: simple-html-app
    spec:
      containers:
      - name: html-container
        image: krishnabobbepalli/simple-html-app:2d2dd26d90afd62dce05a974638180bf0e9a9ea5
        ports:
        - containerPort: 80