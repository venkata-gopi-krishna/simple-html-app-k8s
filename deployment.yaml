apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-html-app
  labels:
    app: simple-html-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-html-app
  template:
    metadata:
      labels:
        app: simple-html-app
    spec:
      containers:
      - name: html-container
        image: krishnabobbepalli/simple-html-app:d5f312216b8976ca06dcf3996050ce5792b32d72
        ports:
        - containerPort: 80