apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-html-app
  labels:
    app: simple-html-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-html-app
  template:
    metadata:
      labels:
        app: simple-html-app
    spec:
      containers:
      - name: html-container
        image: krishnabobbepalli/simple-html-app:483ed11528f15fb186710d065ef2e2f7f6988c34
        ports:
        - containerPort: 80