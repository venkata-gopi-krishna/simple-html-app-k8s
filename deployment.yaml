apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-html-app
  labels:
    app: simple-html-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-html-app
  template:
    metadata:
      labels:
        app: simple-html-app
    spec:
      containers:
      - name: html-container
        image: krishnabobbepalli/simple-html-app:3a4d3522191cbd0ae06dd4d17f9bfe2580da93a0
        ports:
        - containerPort: 80